<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Gorjetas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="h1">Calculadora de Gorjetas</h1>

        <label for="totalConta">Valor da Conta (R$):</label>
        <input type="number" id="totalConta" placeholder="Ex: 100.00">

        <label for="porcentagemGorjeta">Qualidade do Serviço:</label>
        <select id="porcentagemGorjeta">
            <option value="0.15">15% (Bom)</option>
            <option value="0.1" selected>10% (Regular)</option>
            <option value="0.05">5% (Ruim)</option>
        </select>

        <button id="calcular" class="button"><strong>Calcular</strong></button>
        <div id="resultado" class="hidden">
            <p>Gorjeta Total: <span id="valorGorjeta">R$ 0,00</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
