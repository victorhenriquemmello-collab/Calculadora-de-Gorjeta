<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Gorjetas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>Calculadora de Gorjeta</h1>
            <p>Calcule a gorjeta em tempo real!</p>
        </header>

        <main>
            <div class="input-group-valor">
                <label for="totalConta">Quanto deu a conta?</label>
                <div class="input-wrapper">
                    <span class="currency-symbol">R$</span>
                    <input type="number" id="totalConta" placeholder="0,00" step="0.01">
                </div>
            </div>

            <div class="input-group">
                <label>Porcentagem</label><br>
                <button type="button" class="tip-btn" data-percent="0.05"><strong>5%</strong></button>
                <button type="button" class="tip-btn" data-percent="0.10"><strong>10%</strong></button><br><br>
                <button type="button" class="tip-btn active" data-percent="0.15"><strong>15%</strong></button>
            </div>

            <div id="resultado" class="hidden">
                <hr class="hr">
                <div class="result-line">
                    <span>Gorjeta:</span>
                    <strong id="valorGorjeta">R$ 0,00</strong>
                </div>
                <div class="result-line total">
                    <span>Total Final:</span>
                    <strong id="totalFinal">R$ 0,00</strong>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
