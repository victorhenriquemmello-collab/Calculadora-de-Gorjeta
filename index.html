<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Gorjetas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>Tip Calculator</h1>
            <p>Calcule a gorjeta em tempo real</p>
        </header>

        <main>
            <div class="input-group">
                <label for="totalConta">Quanto deu a conta?</label>
                <div class="currency-input">
                    <span>R$</span>
                    <input type="number" id="totalConta" placeholder="0,00" step="0.01">
                </div>
            </div>

            <div class="input-group">
                <label for="porcentagemGorjeta">Qualidade do serviço</label>
                <select id="porcentagemGorjeta">
                    <option value="0.30">30% — Excepcional</option>
                    <option value="0.20">20% — Muito bom</option>
                    <option value="0.15">15% — Bom</option>
                    <option value="0.10" selected>10% — Regular</option>
                    <option value="0.05">5% — Ruim</option>
                </select>
            </div>

            <div id="resultado" class="hidden">
                <hr>
                <div class="result-line">
                    <span>Gorjeta:</span>
                    <strong id="valorGorjeta">R$ 0,00</strong>
                </div>
                <div class="result-line total">
                    <span>Total Final:</span>
                    <strong id="totalFinal">R$ 0,00</strong>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
